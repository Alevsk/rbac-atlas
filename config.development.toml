# Development config overlay — use with: make serve-dev
# Only renders the "pages" and "rules" sections, skipping the 25k+ chart pages.

[segments]
  [segments.dev]
    [[segments.dev.includes]]
      kind = "{home,taxonomy,term}"
    [[segments.dev.includes]]
      kind = "page"
      path = "{/pages/**,/rules/**}"
    [[segments.dev.includes]]
      kind = "section"
      path = "{/pages,/rules}"
